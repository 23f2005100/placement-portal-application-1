<!DOCTYPE html>
<html>
<head>
  <title>Edit Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

  <h4>Edit Profile</h4>

  <form method="POST" enctype="multipart/form-data">

    <div class="mb-3">
      <label>Full Name</label>
      <input type="text" name="name" class="form-control"
             value="{{ student.fullname }}" required>
    </div>

    <div class="mb-3">
      <label>Education</label>
      <input type="text" name="education" class="form-control"
             value="{{ student.education or '' }}">
    </div>

    <div class="mb-3">
      <label>Skills</label>
      <input type="text" name="skills" class="form-control"
             value="{{ student.skills or '' }}">
    </div>

    <div class="mb-3">
      <label>Upload Resume (PDF)</label>
      <input type="file" name="resume" class="form-control" accept=".pdf">
      {% if student.resume_filename %}
        <small class="text-muted">Current resume: {{ student.resume_filename }}</small>
      {% endif %}
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
    <a href="/student_dashboard/{{ student.user_id }}" class="btn btn-secondary ms-2">Cancel</a>

  </form>

</div>
</body>
</html>
