<!DOCTYPE html>
<html>
<head>
  <title>Edit Drive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container mt-4">
  <h4>Edit Drive</h4>

  <form method="POST">

    <div class="mb-3">
      <label class="form-label">Drive Name</label>
      <input type="text" name="name" class="form-control" value="{{ drive.drive_name }}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Job Title</label>
      <input type="text" name="title" class="form-control" value="{{ drive.job_title }}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Job Description</label>
      <textarea name="description" class="form-control" required>{{ drive.job_description }}</textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Eligibility Criteria</label>
      <input type="text" name="eligibility" class="form-control" value="{{ drive.eligibility or '' }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Salary</label>
      <input type="text" name="salary" class="form-control" value="{{ drive.salary or '' }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Application Deadline</label>
      <input type="date" name="deadline" class="form-control" value="{{ drive.deadline }}" required>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="/company_dashboard/{{ user_id }}" class="btn btn-secondary ms-2">Cancel</a>

  </form>
</div>
</body>
</html>
